        .flicker-on-hover:hover {

        @keyframes flicker {

<body class="bg-background text-on-surface h-screen w-screen overflow-hidden font-body-md text-body-md flex">

</div>

<span class="material-symbols-outlined absolute left-0 bottom-1 text-outline-variant text-sm" style="font-variation-settings: 'FILL' 0;">search</span>

<button class="w-8 h-8 flex items-center justify-center rounded text-slate-400 hover:bg-sky-400/10 hover:text-sky-300 transition-colors flicker-on-hover duration-75">

</button>
<button class="w-8 h-8 flex items-center justify-center rounded text-slate-400 hover:bg-sky-400/10 hover:text-sky-300 transition-colors flicker-on-hover duration-75">

</button>
<button class="w-8 h-8 flex items-center justify-center rounded text-slate-400 hover:bg-sky-400/10 hover:text-sky-300 transition-colors flicker-on-hover duration-75 relative">

<span class="absolute top-1 right-1 w-2 h-2 rounded-full bg-primary animate-pulse"></span>
</button>
</div>

            </button>

</div>
<div>

</div>

<span class="material-symbols-outlined text-[18px]">hub</span>
<span class="font-label-caps text-label-caps">Network</span>
</a>

<div class="absolute left-0 top-0 bottom-0 w-[1px] bg-sky-400 shadow-[0_0_8px_rgba(56,189,248,0.8)]"></div>

</a>

<span class="font-label-caps text-label-caps">Security</span>

</a>
