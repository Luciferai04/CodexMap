name: CodexMap CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run test:cli-ux
      - run: npm run test:package
      - run: npm run test:e2e:fake
      - run: npm run test:e2e:codex
      - run: npm run pack:smoke
